version: '3.8'

services:
  # MySQL Database Service
  mysql_db:
    image: mysql:8.0
    container_name: mysql_db
    environment:
      MYSQL_DATABASE: ai_interview_db
      MYSQL_ROOT_PASSWORD: root_password_123
      MYSQL_USER: interview_user
      MYSQL_PASSWORD: interview_pass_123
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql-schema.sql:/docker-entrypoint-initdb.d/mysql-schema.sql
    networks:
      - app-network
    restart: unless-stopped

  # Spring Boot Java Backend
  java_backend:
    build:
      context: ./java-backend
      dockerfile: Dockerfile
    container_name: java_backend
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql_db:3306/ai_interview_db?useSSL=false&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: interview_user
      SPRING_DATASOURCE_PASSWORD: interview_pass_123
      GEMINI_API_KEY: ${GEMINI_API_KEY}
    depends_on:
      - mysql_db
    networks:
      - app-network
    restart: unless-stopped

  # React Frontend (Nginx static content server)
  react_frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: react_frontend
    ports:
      - "3000:3000"
    depends_on:
      - java_backend
    networks:
      - app-network
    restart: unless-stopped

volumes:
  mysql_data:

networks:
  app-network:
    driver: bridge
